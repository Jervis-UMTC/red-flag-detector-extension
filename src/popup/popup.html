<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PH Red Flag Detector</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>PH Red Flag Detector</h1>
          <p id="statusText" class="status-text" role="status">Ready</p>
        </div>
        <span class="flag-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
            <line x1="4" y1="22" x2="4" y2="15"></line>
          </svg>
        </span>
      </header>

      <form id="settingsForm" class="settings-form">
        <label class="switch-row">
          <div class="toggle-wrapper">
            <input id="enabledInput" type="checkbox" class="toggle-checkbox">
            <span class="toggle-slider"></span>
          </div>
          <span class="switch-text">
            <strong>Enable on Messenger</strong>
            <small>Manual scan button appears on supported Messenger pages.</small>
          </span>
        </label>

        <label class="field">
          <span>Language mix</span>
          <select id="languageMixInput"></select>
        </label>


        <label class="field">
          <span>API base URL</span>
          <input id="apiUrlInput" type="url" inputmode="url" autocomplete="off" spellcheck="false">
        </label>

        <label class="switch-row">
          <div class="toggle-wrapper">
            <input id="previewInput" type="checkbox" class="toggle-checkbox">
            <span class="toggle-slider"></span>
          </div>
          <span class="switch-text">
            <strong>Preview before sending</strong>
            <small>Review the detected message window before analysis.</small>
          </span>
        </label>

        <label class="switch-row">
          <div class="toggle-wrapper">
            <input id="consentInput" type="checkbox" class="toggle-checkbox">
            <span class="toggle-slider"></span>
          </div>
          <span class="switch-text">
            <strong>Consent to manual scans</strong>
            <small>Recent chat text is sent to the configured API only when Analyze is clicked.</small>
          </span>
        </label>


        <div class="button-row">
          <button id="saveButton" type="submit" class="button button-primary">Save</button>
          <button id="testButton" type="button" class="button button-secondary">Test API</button>
        </div>
      </form>

      <p class="fine-print">
        Output is model-generated and advisory. It is not proof of harm or professional advice.
      </p>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
